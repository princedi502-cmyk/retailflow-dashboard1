[build]
  base = "frontend/"
  command = "npm run build"
  publish = "dist/"

[build.environment]
  NODE_VERSION = "18"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[context.production.environment]
  VITE_API_URL = "https://retailflow-backend-production.up.railway.app"
  VITE_ENV = "production"
  VITE_VERSION = "1.0.0"
